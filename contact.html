<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Nous contacter</title><style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;padding:26px 12px;font-family:Georgia,"Times New Roman",serif;color:white;background:linear-gradient(rgba(0,0,0,.48),rgba(0,0,0,.58)),url("Un dimanche d'été à Ascain.jpeg") center/cover fixed;}main{width:min(720px,97%);margin:0 auto;padding:30px;border-radius:14px;background:rgba(20,55,32,.95);box-shadow:0 8px 28px rgba(0,0,0,.48)}h1{margin-top:0;text-align:center}.introduction{text-align:center;line-height:1.55}.champ{margin-bottom:17px}label{display:block;margin-bottom:6px;font-weight:bold}input,select,textarea{width:100%;padding:11px 12px;border:1px solid #ccc;border-radius:6px;font:inherit}textarea{min-height:170px;resize:vertical}button{display:block;width:100%;padding:14px;border:0;border-radius:8px;background:#f6f3ea;color:rgb(20,55,32);font:inherit;font-weight:bold;cursor:pointer}button:hover{background:#ffe9a8}#messageEtat{min-height:24px;text-align:center;font-weight:bold}.retour{display:block;margin-top:24px;color:white;text-align:center}@media(max-width:520px){body{padding:8px 4px;background-attachment:scroll}main{width:99%;padding:22px 14px}}
</style></head><body><main><h1>Nous contacter</h1><p class="introduction">Pour toute question concernant l’ouvrage, une commande ou une livraison, remplissez ce formulaire.</p>
<form id="formulaireContact" method="post" target="reponseInvisible"><input type="hidden" name="type" value="contact">
<div class="champ"><label for="prenom">Prénom *</label><input type="text" id="prenom" name="prenom" required></div>
<div class="champ"><label for="nom">Nom *</label><input type="text" id="nom" name="nom" required></div>
<div class="champ"><label for="email">Adresse électronique *</label><input type="email" id="email" name="email" required></div>
<div class="champ"><label for="objet">Objet *</label><select id="objet" name="objet" required><option value="">Choisissez</option><option>Question sur le livre</option><option>Question sur une commande</option><option>Question sur une livraison</option><option>Autre demande</option></select></div>
<div class="champ"><label for="message">Votre message *</label><textarea id="message" name="message" required></textarea></div>
<button type="submit">Envoyer le message</button><p id="messageEtat"></p></form>
<iframe name="reponseInvisible" title="Réponse du formulaire" hidden></iframe><a class="retour" href="livre.html">← Retour à la présentation du livre</a></main>
<script>"use strict";const URL_APPS_SCRIPT="COLLEZ_ICI_URL_APPS_SCRIPT";const f=document.getElementById("formulaireContact"),m=document.getElementById("messageEtat");f.action=URL_APPS_SCRIPT;f.addEventListener("submit",e=>{if(URL_APPS_SCRIPT.includes("COLLEZ_ICI")){e.preventDefault();m.textContent="Le formulaire doit encore être relié à Google Apps Script.";return}m.textContent="Envoi du message…";setTimeout(()=>{m.textContent="Votre message a été transmis.";f.reset()},1000)});</script>
</body></html>

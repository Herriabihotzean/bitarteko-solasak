<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Manuel de la conversation, 1861</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;

            font-family: Georgia, "Times New Roman", serif;
            color: white;

            background-image:
                linear-gradient(
                    rgba(0, 0, 0, 0.35),
                    rgba(0, 0, 0, 0.35)
                ),
                url("Un dimanche d'été à Ascain.jpeg");

            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Bandeau supérieur fixe pendant le défilement */

        header {
            position: sticky;
            top: 0;
            z-index: 1000;

            width: 100%;
            padding: 14px 20px 16px;

            text-align: center;
            background-color: rgba(20, 55, 32, 0.92);

            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
        }

        #entete-titres {
            display: flex;
            align-items: center;
            justify-content: center;

            width: min(900px, 100%);
            margin: 0 auto 10px;
            gap: 30px;
        }

        #bloc-titres {
            flex: 1;
            text-align: center;
        }

        .blason {
            width: 85px;
            height: 85px;

            object-fit: contain;
            flex-shrink: 0;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            line-height: 1.15;
        }

        #sous-titre {
            margin: 5px 0 0;

            font-size: 1.05rem;
            font-weight: bold;
            letter-spacing: 0.14em;
        }

        #titre-en-cours {
            min-height: 24px;
            margin: 0 0 10px;

            font-size: 1.05rem;
            font-weight: bold;
            line-height: 1.3;
        }

        #titre-en-cours.avant-propos-en-cours {
            text-transform: uppercase;
            letter-spacing: 0.18em;
        }

        #lecteur {
            display: block;
            width: min(760px, 100%);
            margin: 0 auto;
        }

        /* Contenu principal */

        main {
            width: min(900px, 94%);
            margin: 24px auto 30px;
            padding: 25px;

            background-color: rgba(0, 0, 0, 0.58);
            border-radius: 12px;
        }

        #zone-avant-propos {
            margin: 0 0 22px;
            text-align: center;
        }

        #zone-avant-propos .conversation {
            display: inline-flex;
            width: auto;
            min-width: 240px;
            justify-content: center;
        }

        .instruction {
            margin: 0 0 22px;

            text-align: center;
            font-size: 1.05rem;
        }

        /* Liste des dialogues en deux colonnes verticales */

        #liste-conversations {
            column-count: 2;
            column-gap: 20px;
        }

        .conversation {
            display: flex;
            align-items: center;

            width: 100%;
            margin-bottom: 10px;
            padding: 13px 15px;

            break-inside: avoid;
            page-break-inside: avoid;

            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 8px;

            background-color: rgba(255, 255, 255, 0.14);
            color: white;

            font-family: Georgia, "Times New Roman", serif;
            font-size: 1rem;
            text-align: left;

            cursor: pointer;
        }

        .conversation:hover {
            background-color: rgba(255, 255, 255, 0.28);
        }

        .conversation.active {
            background-color: rgba(255, 255, 255, 0.92);
            color: #222;
            font-weight: bold;
        }

        .conversation.avant-propos {
            justify-content: center;

            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            font-weight: bold;
        }

        .numero {
            display: inline-block;
            min-width: 42px;
            margin-right: 10px;
            font-weight: bold;
        }

        #message {
            margin-top: 18px;
            text-align: center;
            color: #ffe9a8;
        }

        /* Livre de commande */

        #zone-livre {
            position: fixed;
            right: 18px;
            bottom: 8px;
            z-index: 1000;
        }

        .lien-livre {
            display: flex;
            flex-direction: column;
            align-items: center;

            color: white;
            text-decoration: none;
        }

        #livre {
            display: block;
            width: 105px;
            height: auto;

            cursor: pointer;
            transition: transform 0.25s;
        }

        .texte-commander {
            margin-top: 2px;

            font-family: Georgia, "Times New Roman", serif;
            font-size: 0.82rem;
            font-weight: normal;
            line-height: 1;

            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        }

        .lien-livre:hover #livre {
            transform: translateY(-3px) scale(1.03);
        }

        .lien-livre:hover .texte-commander {
            text-decoration: underline;
        }

        /* Affichage sur téléphone */

        @media (max-width: 700px) {
            header {
                padding: 10px 12px 12px;
            }

            #entete-titres {
                gap: 10px;
            }

            .blason {
                width: 48px;
                height: 48px;
            }

            h1 {
                font-size: 1.25rem;
            }

            #sous-titre {
                font-size: 0.8rem;
                letter-spacing: 0.09em;
            }

            #titre-en-cours {
                font-size: 0.9rem;
            }

            main {
                width: 96%;
                margin-top: 14px;
                padding: 16px;
            }

            #liste-conversations {
                column-count: 1;
            }

            #zone-livre {
                position: static;
                margin-top: 30px;
                text-align: center;
            }

            #livre {
                width: 90px;
            }

            .texte-commander {
                font-size: 0.78rem;
            }
        }
    </style>
</head>

<body>

    <header id="bandeau-fixe">

        <div id="entete-titres">

            <img
                src="blason-navarre.svg"
                class="blason"
                alt="Blason de la Navarre"
            >

            <div id="bloc-titres">
                <h1>Manuel de la conversation, 1861</h1>

                <p id="sous-titre">
                    BITARTEKO SOLASAK eta LETRAK
                </p>
            </div>

            <img
                src="blason-labourd.svg"
                class="blason"
                alt="Blason du Labourd"
            >

        </div>

        <p id="titre-en-cours">
            Sélectionnez un enregistrement
        </p>

        <audio id="lecteur" controls preload="metadata">
            Votre navigateur ne permet pas la lecture des fichiers audio.
        </audio>

    </header>

    <main>

        <div id="zone-avant-propos"></div>

        <p class="instruction">
            Choisissez un dialogue. La lecture se poursuivra
            automatiquement dans l’ordre.
        </p>

        <div id="liste-conversations"></div>

        <p id="message"></p>

        <div id="zone-livre">

            <a href="livre.html" class="lien-livre">

                <img
                    src="livre.png"
                    id="livre"
                    alt="Commander le livre"
                >

                <span class="texte-commander">
                    Commander
                </span>

            </a>

        </div>

    </main>

    <script src="conversations.js"></script>
    <script src="script.js"></script>

</body>

</html>

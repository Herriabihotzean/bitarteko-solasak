<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manuel de la conversation</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Georgia, serif;
    background:#f7f2e8;
}

header{
    text-align:center;
    padding:25px;
}

header h1{
    margin-bottom:20px;
    font-size:2em;
}

header img{
    width:90%;
    max-width:700px;
    border-radius:8px;
}

main{
    max-width:900px;
    margin:auto;
    padding:20px;
    padding-bottom:120px;
}

#listeConversations{
    list-style:none;
    margin:0;
    padding:0;
}

#listeConversations li{

    padding:12px;
    margin-bottom:6px;

    border:1px solid #cccccc;

    border-radius:6px;

    background:white;

    cursor:pointer;

    transition:0.2s;
}

#listeConversations li:hover{

    background:#eeeeee;

}

footer{

    position:fixed;

    left:0;
    right:0;
    bottom:0;

    background:white;

    border-top:1px solid #cccccc;

    padding:10px;

}

audio{

    width:100%;

}

</style>

</head>

<body>

<header>

<h1>Manuel de la conversation</h1>

<img
src="Un dimanche d'été à Ascain.jpeg"
alt="Illustration">

</header>

<main>

<ul id="listeConversations">

</ul>

</main>

<footer>

<audio
id="lecteur"
controls>

Votre navigateur ne supporte pas l'audio.

</audio>

</footer>

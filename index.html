<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Manuel de la conversation, 1861</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;

            font-family: Georgia, "Times New Roman", serif;

            background-image:
                linear-gradient(
                    rgba(0, 0, 0, 0.35),
                    rgba(0, 0, 0, 0.35)
                ),
                url("Un dimanche d'été à Ascain.jpeg");

            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            color: white;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 1000;

            width: 100%;
            padding: 14px 20px 16px;

            text-align: center;
            background-color: rgba(28,64,44,0.92);

            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
        }

        h1 {
            margin: 0 0 6px;
            font-size: 1.8rem;
        }

        header p {
            margin: 0;
            font-size: 1.1rem;
        }
        #entete-titres {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            width: min(900px, 100%);
            margin: 0 auto 10px;
        }

        #bloc-titres {
            flex: 1;
            text-align: center;
        }

        .blason {
            width: 85px;
            height: 85px;
            object-fit: contain;
            flex-shrink: 0;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            line-height: 1.15;
        }

        #sous-titre {
            margin: 5px 0 0;
            font-size: 1.05rem;
            font-weight: bold;
            letter-spacing: 0.14em;
        }

        main {
            width: min(900px, 94%);
            margin: 24px auto 30px;
            padding: 25px;

            background-color: rgba(0, 0, 0, 0.58);
            border-radius: 12px;
        }
        
        #zone-avant-propos {
            margin: 0 0 22px;
            text-align: center;
        }

        #zone-avant-propos .conversation {
            display: inline-flex;
            width: auto;
            min-width: 240px;
            justify-content: center;
        }
        
        .instruction {
            margin: 0 0 22px;
            text-align: center;
            font-size: 1.05rem;
        }

        #titre-en-cours {
            min-height: 24px;
            margin: 0 0 10px;

            font-size: 1.05rem;
            font-weight: bold;
            line-height: 1.3;
        }

        #titre-en-cours.avant-propos-en-cours {
            text-transform: uppercase;
            letter-spacing: 0.18em;
        }

        #lecteur {
            display: block;
            width: min(760px, 100%);
            margin: 0 auto;
        }

        #liste-conversations {
            column-count: 2;
            column-gap: 20px;
        }

        .conversation {
            display: block;
            width: 100%;
            margin-bottom: 10px;

            break-inside: avoid;
            page-break-inside: avoid;
            display: flex;
            align-items: center;
            width: 100%;

            padding: 13px 15px;

            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 8px;

            background-color: rgba(255, 255, 255, 0.14);
            color: white;

            font-family: Georgia, "Times New Roman", serif;
            font-size: 1rem;
            text-align: left;

            cursor: pointer;
        }

        .conversation:hover {
            background-color: rgba(255, 255, 255, 0.28);
        }

        .conversation.active {
            background-color: rgba(255, 255, 255, 0.92);
            color: #222;
            font-weight: bold;
        }

        .conversation.avant-propos {
            text-transform: uppercase;
            letter-spacing: 0.16em;
            font-weight: bold;
            text-align: center;
            justify-content: center;
        }

        .numero {
            display: inline-block;
            min-width: 42px;
            margin-right: 10px;
            font-weight: bold;
        }

        #message {
            margin-top: 18px;
            text-align: center;
            color: #ffe9a8;
        }

        @media (min-width: 700px) {
            #liste-conversations {
                grid-template-columns: 1fr 1fr;
            }
        }
        @media (max-width: 600px) {
            header {
                padding: 10px 12px 12px;
            }

            h1 {
                font-size: 1.35rem;
            }

            #titre-en-cours {
                font-size: 0.95rem;
            }

            main {
                width: 96%;
                margin-top: 14px;
                padding: 16px;
            }
        }
        @media (max-width: 600px) {

            header {
                padding: 10px 12px 12px;
            }

            #entete-titres {
                gap: 10px;
            }

            .blason {
                width: 48px;
                height: 48px;
            }

            h1 {
                font-size: 1.25rem;
            }

            #sous-titre {
                font-size: 0.8rem;
                letter-spacing: 0.09em;
            }

            #titre-en-cours {
                font-size: 0.9rem;
            }

            main {
                width: 96%;
                margin-top: 14px;
                padding: 16px;
            }

            #liste-conversations {
                column-count: 1;
            }
        }
    </style>
</head>

<body>

    <header id="bandeau-fixe">
     <div id="entete-titres">

        <img
            src="blason-navarre.svg"
            class="blason"
            alt="Blason de la Navarre"
        >

        <div id="bloc-titres">
            <h1>Manuel de la conversation</h1>
            <p id="sous-titre">BITARTEKO SOLASAK eta LETRAK</p>
        </div>

        <img
            src="blason-labourd.svg"
            class="blason"
            alt="Blason du Labourd"
        >

    </div>

    <p id="titre-en-cours">
        Sélectionnez un enregistrement
    </p>

    <audio id="lecteur" controls preload="metadata">
        Votre navigateur ne permet pas la lecture des fichiers audio.
    </audio>
</header>

<main>
    <div id="zone-avant-propos"></div>
    
    <p class="instruction">
        Choisissez un dialogue. La lecture se poursuivra
        automatiquement dans l’ordre.
    </p>

    <div id="liste-conversations"></div>

    <p id="message"></p>
</main>

    <script src="conversations.js"></script>
    <script src="script.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Manuel de la conversation</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;

            font-family: Georgia, "Times New Roman", serif;

            background-image:
                linear-gradient(
                    rgba(0, 0, 0, 0.35),
                    rgba(0, 0, 0, 0.35)
                ),
                url("Un dimanche d’été à Ascain.jpeg");

            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            color: white;
        }

        header {
            text-align: center;
            padding: 40px 20px 25px;
            background-color: rgba(0, 0, 0, 0.45);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 2.3rem;
        }

        header p {
            margin: 0;
            font-size: 1.1rem;
        }

        main {
            width: min(900px, 94%);
            margin: 30px auto;
            padding: 25px;

            background-color: rgba(0, 0, 0, 0.58);
            border-radius: 12px;
        }

        #titre-en-cours {
            min-height: 30px;
            margin: 0 0 15px;
            text-align: center;
            font-size: 1.25rem;
            font-weight: bold;
        }

        #lecteur {
            display: block;
            width: 100%;
            margin-bottom: 25px;
        }

        #liste-conversations {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .conversation {
            display: flex;
            align-items: center;
            width: 100%;

            padding: 13px 15px;

            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 8px;

            background-color: rgba(255, 255, 255, 0.14);
            color: white;

            font-family: Georgia, "Times New Roman", serif;
            font-size: 1rem;
            text-align: left;

            cursor: pointer;
        }

        .conversation:hover {
            background-color: rgba(255, 255, 255, 0.28);
        }

        .conversation.active {
            background-color: rgba(255, 255, 255, 0.92);
            color: #222;
            font-weight: bold;
        }

        .numero {
            display: inline-block;
            min-width: 42px;
            margin-right: 10px;
            font-weight: bold;
        }

        #message {
            margin-top: 18px;
            text-align: center;
            color: #ffe9a8;
        }

        @media (min-width: 700px) {
            #liste-conversations {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Manuel de la conversation</h1>

        <p>
            Choisissez une conversation. La lecture se poursuivra
            automatiquement dans l’ordre.
        </p>
    </header>

    <main>
        <p id="titre-en-cours">
            Sélectionnez une conversation
        </p>

        <audio id="lecteur" controls preload="metadata">
            Votre navigateur ne permet pas la lecture des fichiers audio.
        </audio>

        <div id="liste-conversations"></div>

        <p id="message"></p>
    </main>

    <script src="conversations.js"></script>
    <script src="scripts.js"></script>

</body>

</html>

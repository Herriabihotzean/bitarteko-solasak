<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Écouter — Manuel de la conversation</title>
<style>
        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 0 0 45px;

            font-family: Georgia, "Times New Roman", serif;
            color: white;

            background-image:
                linear-gradient(
                    rgba(18, 18, 18, 0.60),
                    rgba(18, 18, 18, 0.76)
                ),
                url("Un dimanche d'été à Ascain.jpeg");

            background-position: center;
            background-size: cover;
            background-attachment: fixed;
        }

        button {
            font-family: inherit;
        }

        .barre-superieure {
            position: sticky;
            top: 0;
            z-index: 200;

            padding:
                max(9px, env(safe-area-inset-top))
                max(12px, env(safe-area-inset-right))
                11px
                max(12px, env(safe-area-inset-left));

            background-color: rgba(20, 55, 32, 0.96);

            box-shadow:
                0 4px 18px
                rgba(0, 0, 0, 0.42);
        }

        .ligne-titres {
            display: grid;
            grid-template-columns: 76px 1fr 76px;
            align-items: center;
            gap: 14px;

            width: min(900px, 100%);
            margin: 0 auto 7px;
        }

        .blason {
            display: block;
            width: 70px;
            height: 70px;
            object-fit: contain;
        }

        .blason-gauche {
            justify-self: start;
        }

        .blason-droit {
            justify-self: end;
        }

        .titres {
            min-width: 0;
            text-align: center;
        }

        .titre-principal {
            margin: 0;

            font-size:
                clamp(1.25rem, 3.2vw, 1.9rem);

            line-height: 1.15;
        }

        .sous-titre {
            margin: 4px 0 0;

            font-size:
                clamp(0.74rem, 2vw, 1rem);

            font-weight: bold;
            letter-spacing: 0.11em;
        }

        #titreEnCours {
            width: min(850px, 100%);
            min-height: 25px;
            margin: 5px auto 8px;

            overflow: hidden;

            font-size: 0.98rem;
            font-weight: bold;
            line-height: 1.3;

            text-align: center;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #lecteur {
            display: block;
            width: min(760px, 100%);
            height: 46px;
            margin: 0 auto;
        }

        .commandes-navigation {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;

            width: min(900px, 100%);
            margin: 8px auto 0;
        }

        .bouton-navigation {
            min-height: 38px;
            padding: 7px 12px;

            border: 1px solid
                rgba(255, 255, 255, 0.72);

            border-radius: 6px;

            background:
                rgba(255, 255, 255, 0.08);

            color: white;
            font-size: 0.9rem;

            cursor: pointer;
        }

        .bouton-navigation:hover,
        .bouton-navigation:focus-visible {
            background: white;
            color: rgb(20, 55, 32);
        }

        body.mode-plein-ecran
        #retourPresentation {
            visibility: hidden;
            pointer-events: none;
        }

        .espace-navigation {
            flex: 1;
        }

        main {
            width:
                min(900px, calc(100% - 24px));

            margin: 24px auto 45px;
            padding: 25px;

            border-radius: 12px;

            background:
                rgba(0, 0, 0, 0.56);
        }

        #zoneAvantPropos {
            margin: 0 0 22px;
            text-align: center;
        }

        #zoneAvantPropos .bouton-conversation{
            display:inline-flex;
            align-items:center;
            justify-content:center;

            width:auto;
            min-width:250px;

            padding-left:24px;
            padding-right:24px;

            text-align:center;
            text-transform:uppercase;
            letter-spacing:.15em;
        }

        .instruction {
            margin: 0 0 22px;

            font-size: 1.04rem;
            line-height: 1.5;
            text-align: center;
        }

        #listeConversations {
            column-count: 2;
            column-gap: 20px;
        }

        .bouton-conversation {
            display: inline-flex;
            align-items: center;

            width: 100%;
            min-height: 58px;
            margin: 0 0 10px;
            padding: 12px 14px;

            break-inside: avoid;
            page-break-inside: avoid;

            border: 1px solid
                rgba(255, 255, 255, 0.52);

            border-radius: 7px;

            background:
                rgba(255, 255, 255, 0.12);

            color: white;

            font-size:
                clamp(0.94rem, 2vw, 1.04rem);

            font-weight: normal;
            line-height: 1.35;
            text-align: left;

            cursor: pointer;

            transition:
                background-color 0.16s,
                color 0.16s,
                transform 0.16s;
        }

        .bouton-conversation:hover,
        .bouton-conversation:focus-visible {
            background:
                rgba(255, 255, 255, 0.23);

            transform: translateY(-1px);
        }

        .numero {
            flex: 0 0 42px;
            font-weight: bold;
        }

        .titre-conversation {
            flex: 1;
        }

        .bouton-conversation.en-lecture {
            border-color: #f6f3ea;
            background: #f6f3ea;
            color: #202020;
            font-weight: bold;

            box-shadow:
                0 0 0 2px
                rgba(255, 255, 255, 0.18);
        }

        .bouton-conversation.en-pause {
            border-color: #e5dfcf;
            background: #e5dfcf;
            color: #202020;
            font-weight: normal;
            box-shadow: none;
        }

        #message {
            min-height: 22px;
            margin: 18px 0 0;

            color: #ffe9a8;
            text-align: center;
        }

        @media (max-width: 650px) {
            body {
                background-attachment: scroll;
            }

            .ligne-titres {
                grid-template-columns:
                    48px 1fr 48px;

                gap: 7px;
            }

            .blason {
                width: 46px;
                height: 46px;
            }

            .titre-principal {
                font-size: 1.2rem;
            }

            .sous-titre {
                font-size: 0.68rem;
                letter-spacing: 0.07em;
            }

            #titreEnCours {
                font-size: 0.87rem;
            }

            .texte-retour {
                display: none;
            }

            .bouton-navigation {
                min-width: 43px;
                padding: 7px 9px;
                font-size: 1rem;
            }

            main {
                width: calc(100% - 14px);
                margin-top: 12px;
                padding: 16px 12px;
            }

            #listeConversations {
                column-count: 1;
            }

            #zoneAvantPropos
            .bouton-conversation {
                width: 100%;
                min-width: 0;
            }
        }
    </style>
<link href="langues.css" rel="stylesheet"/></head>
<body>
<header class="barre-superieure">
<div class="ligne-titres">
<img alt="Blason de la Navarre" class="blason blason-gauche" src="blason-navarre.svg"/>
<div class="titres">
<h1 class="titre-principal">
                    Manuel de la conversation
                </h1>
<p class="sous-titre">
                    ESKU LIBURUA MINTZATZEN IKHASTEKO
                </p>
</div>
<img alt="Blason du Labourd" class="blason blason-droit" src="blason-labourd.svg"/>
</div>
<div aria-live="polite" id="titreEnCours">
            Aucun enregistrement sélectionné
        </div>
<audio controls="" id="lecteur" preload="metadata"></audio>
<div class="commandes-navigation">
<button aria-label="Retour à la présentation" class="bouton-navigation" id="retourPresentation" type="button">
                ←
                <span class="texte-retour">
                    Présentation
                </span>
</button>
<div class="espace-navigation"></div>
<button aria-label="Activer ou quitter le plein écran" class="bouton-navigation" id="boutonPleinEcran" title="Activer ou quitter le plein écran" type="button">
                ⛶
            </button>
</div>
</header>
<main>
<div id="zoneAvantPropos"></div>
<p class="instruction">
            <span>Choisissez un dialogue</span>.
            <span>La lecture se poursuivra automatiquement dans l’ordre</span>.
        </p>
<section aria-label="Liste des dialogues" id="listeConversations"></section>
<p id="message"></p>
</main>
<script src="conversations.js"></script>
<script src="script.js"></script>
<script src="langues.js"></script></body>
</html>

<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Manuel de la conversation</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;

            font-family: Georgia, "Times New Roman", serif;

            background-image:
                linear-gradient(
                    rgba(0, 0, 0, 0.35),
                    rgba(0, 0, 0, 0.35)
                ),
                url("Un dimanche d'été à Ascain.jpeg");

            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            color: white;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 1000;

            width: 100%;
            padding: 14px 20px 16px;

            text-align: center;
            background-color: rgba(0, 0, 0, 0.88);

            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
        }

        h1 {
            margin: 0 0 6px;
            font-size: 1.8rem;
        }

        header p {
            margin: 0;
            font-size: 1.1rem;
        }

        main {
            width: min(900px, 94%);
            margin: 24px auto 30px;
            padding: 25px;

            background-color: rgba(0, 0, 0, 0.58);
            border-radius: 12px;
        }
        .instruction {
            margin: 0 0 22px;
            text-align: center;
            font-size: 1.05rem;
        }

        #titre-en-cours {
            min-height: 24px;
            margin: 0 0 10px;

            font-size: 1.05rem;
            font-weight: bold;
            line-height: 1.3;
        }

        #lecteur {
            display: block;
            width: min(760px, 100%);
            margin: 0 auto;
        }

        #liste-conversations {
            column-count: 2;
            column-gap: 20px;
        }

        .conversation {
            display: block;
            width: 100%;
            margin-bottom: 10px;

            break-inside: avoid;
            page-break-inside: avoid;
            display: flex;
            align-items: center;
            width: 100%;

            padding: 13px 15px;

            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 8px;

            background-color: rgba(255, 255, 255, 0.14);
            color: white;

            font-family: Georgia, "Times New Roman", serif;
            font-size: 1rem;
            text-align: left;

            cursor: pointer;
        }

        .conversation:hover {
            background-color: rgba(255, 255, 255, 0.28);
        }

        .conversation.active {
            background-color: rgba(255, 255, 255, 0.92);
            color: #222;
            font-weight: bold;
        }

        .numero {
            display: inline-block;
            min-width: 42px;
            margin-right: 10px;
            font-weight: bold;
        }

        #message {
            margin-top: 18px;
            text-align: center;
            color: #ffe9a8;
        }

        @media (min-width: 700px) {
            #liste-conversations {
                grid-template-columns: 1fr 1fr;
            }
        }
        @media (max-width: 600px) {
            header {
                padding: 10px 12px 12px;
            }

            h1 {
                font-size: 1.35rem;
            }

            #titre-en-cours {
                font-size: 0.95rem;
            }

            main {
                width: 96%;
                margin-top: 14px;
                padding: 16px;
            }
        }
    </style>
</head>

<body>

    <header id="bandeau-fixe">
    <h1>Manuel de la conversation</h1>

    <p id="titre-en-cours">
        Sélectionnez une conversation
    </p>

    <audio id="lecteur" controls preload="metadata">
        Votre navigateur ne permet pas la lecture des fichiers audio.
    </audio>
</header>

<main>
    <p class="instruction">
        Choisissez une conversation. La lecture se poursuivra
        automatiquement dans l’ordre.
    </p>

    <div id="liste-conversations"></div>

    <p id="message"></p>
</main>

    <script src="conversations.js"></script>
    <script src="script.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >

    <title>Écouter — Manuel de la conversation</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            margin: 0;
            padding: 0 0 125px;
            font-family: Georgia, "Times New Roman", serif;
            background:
                linear-gradient(rgba(18, 18, 18, 0.7), rgba(18, 18, 18, 0.82)),
                url("Un dimanche d’été à Ascain.jpeg") center / cover fixed;
            color: white;
        }

        button {
            font-family: inherit;
        }

        .barre-superieure {
            position: sticky;
            z-index: 100;
            top: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            min-height: 66px;
            padding:
                max(10px, env(safe-area-inset-top))
                max(12px, env(safe-area-inset-right))
                10px
                max(12px, env(safe-area-inset-left));
            background: rgba(30, 30, 30, 0.95);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.32);
        }

        .bouton-navigation {
            min-height: 43px;
            padding: 9px 13px;
            border: 1px solid rgba(255, 255, 255, 0.75);
            border-radius: 6px;
            background: transparent;
            color: white;
            font-size: 0.94rem;
            cursor: pointer;
        }

        .bouton-navigation:hover,
        .bouton-navigation:focus-visible {
            background: white;
            color: #222;
        }

        .titre-court {
            flex: 1;
            margin: 0;
            font-size: clamp(1rem, 3vw, 1.35rem);
            text-align: center;
        }

        main {
            width: min(850px, calc(100% - 24px));
            margin: 0 auto;
            padding: 34px 0 60px;
        }

        .introduction {
            margin-bottom: 28px;
            padding: 25px 20px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 7px;
            background: rgba(0, 0, 0, 0.38);
            text-align: center;
        }

        .introduction h1 {
            margin: 0 0 10px;
            font-size: clamp(1.65rem, 5vw, 2.7rem);
        }

        .introduction p {
            margin: 0;
            line-height: 1.55;
        }

        #listeConversations {
            display: grid;
            gap: 11px;
        }

        .bouton-conversation {
            display: flex;
            align-items: center;
            width: 100%;
            min-height: 60px;
            padding: 13px 16px;
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 7px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: clamp(0.98rem, 2.6vw, 1.1rem);
            line-height: 1.35;
            text-align: left;
            cursor: pointer;
            transition:
                transform 0.15s ease,
                background 0.15s ease,
                border-color 0.15s ease;
        }

        .bouton-conversation:hover,
        .bouton-conversation:focus-visible {
            border-color: white;
            background: rgba(255, 255, 255, 0.13);
            transform: translateY(-1px);
        }

        .numero {
            flex: 0 0 48px;
            font-weight: bold;
        }

        .icone-etat {
            flex: 0 0 35px;
            margin-left: auto;
            padding-left: 10px;
            font-size: 1.2rem;
            text-align: right;
        }

        /*
         * Le bouton en lecture possède un aspect différent.
         */
        .bouton-conversation.en-lecture {
            border-color: #fff;
            background: rgba(125, 0, 0, 0.88);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.18);
        }

        /*
         * Après un second clic, la lecture est en pause et
         * le bouton redevient entièrement normal.
         */
        .bouton-conversation.en-pause {
            border-color: rgba(255, 255, 255, 0.55);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: none;
        }

        .lecteur-fixe {
            position: fixed;
            z-index: 200;
            right: 0;
            bottom: 0;
            left: 0;
            padding:
                10px
                max(12px, env(safe-area-inset-right))
                calc(10px + env(safe-area-inset-bottom))
                max(12px, env(safe-area-inset-left));
            background: rgba(20, 20, 20, 0.97);
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.38);
        }

        #titreEnCours {
            width: min(850px, 100%);
            min-height: 24px;
            margin: 0 auto 7px;
            overflow: hidden;
            font-size: 0.94rem;
            text-align: center;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #lecteur {
            display: block;
            width: min(850px, 100%);
            height: 48px;
            margin: 0 auto;
        }

        @media (max-width: 520px) {
            .texte-retour {
                display: none;
            }

            .bouton-navigation {
                min-width: 46px;
                padding: 8px 10px;
                font-size: 1.1rem;
            }

            .titre-court {
                font-size: 1rem;
            }

            main {
                width: min(100% - 16px, 850px);
            }

            .numero {
                flex-basis: 39px;
            }
        }
    </style>
</head>

<body>

    <nav class="barre-superieure">
        <button
            id="retourPresentation"
            class="bouton-navigation"
            type="button"
            aria-label="Retour à la présentation du livre"
        >
            ← <span class="texte-retour">Présentation</span>
        </button>

        <h1 class="titre-court">
            Manuel de la conversation
        </h1>

        <button
            id="boutonPleinEcran"
            class="bouton-navigation"
            type="button"
            aria-label="Activer ou quitter le plein écran"
            title="Activer ou quitter le plein écran"
        >
            ⛶
        </button>
    </nav>

    <main>
        <section class="introduction">
            <h1>Bitarteko solasak</h1>

            <p>
                Sélectionnez l’avant-propos ou la conversation que vous
                souhaitez écouter. Cliquez une seconde fois sur le même
                bouton pour mettre la lecture en pause.
            </p>
        </section>

        <section
            id="listeConversations"
            aria-label="Liste des enregistrements"
        ></section>
    </main>

    <div class="lecteur-fixe">
        <div id="titreEnCours" aria-live="polite">
            Aucun enregistrement sélectionné
        </div>

        <audio
            id="lecteur"
            controls
            preload="metadata"
        ></audio>
    </div>

    <script src="conversations.js"></script>
    <script src="script.js"></script>

</body>
</html>
